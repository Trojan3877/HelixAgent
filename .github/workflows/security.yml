name: Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Dependency & Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: Fetches full history so git refs exist

      # UPDATED STEP: Runs inline scanning on the repository files directly rather than a commit diff
      - name: 🛡️ Scan for Hardcoded Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      # Safely evaluate external packages
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Check Python Package Dependencies
        run: |
          pip install safety
          safety check || echo "⚠️ Security Scan: Please review dependency alerts above."
