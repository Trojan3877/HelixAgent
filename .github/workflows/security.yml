name: Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Dependency & Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🛡️ Scan for Hardcoded Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Check Python Package Dependencies
        run: |
          pip install safety
          # Runs safety check but prevents it from breaking the build on warning definitions
          safety check || echo "⚠️ Security Scan: Please review the dependency alerts above."
