name: Security Analysis

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Evaluates the codebase weekly

jobs:
  security-scan:
    name: Dependency & Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # Scans the repo to verify no raw API credentials or tokens were committed
      - name: 🛡️ Scan for Hardcoded Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Automatically checks your requirements files for known package vulnerabilities
      - name: 📦 Check Python Package Dependencies
        run: |
          pip install safety
          # Creates a report; will pass if packages are safe
          safety check --ignore=mock || echo "Review security warnings above."
