name: Lint & Test Engine

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality Assurance
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Linting Frameworks
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      # Auto-formats common spacing issues before testing
      - name: 🎨 Run Black Code Formatter Check
        run: black --check src/ tests/ --line-length 120

      # Relaxes line lengths to 120 and skips empty line spacing errors
      - name: 🚀 Run Flake8 Linter
        run: flake8 src/ tests/ --max-line-length=120 --ignore=W293,F401
