name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # UPDATED STEP: Configures Flake8 to handle modern line lengths and ignore whitespace warnings
      - name: 🚀 Run Flake8
        run: flake8 src/ tests/ --max-line-length=120 --ignore=W293
